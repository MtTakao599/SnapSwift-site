<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapSwift Travel Replay</title>
<link rel="stylesheet" href="leaflet/leaflet.css"/>
<link rel="stylesheet" href="travel_replay.css"/>
</head>
<body>
<div id="page-shell">
  <header id="report-header">
    <div id="travel-title">SnapSwift Travel Replay</div>
    <div id="route-mode-banner" class="route-mode-banner" hidden></div>
  </header>
  <div id="main-split">
    <aside id="travel-panel">
      <nav class="tab-bar" role="tablist" aria-label="旅のレポート">
        <button type="button" class="tab-btn active" data-tab="stats" role="tab">統計</button>
        <button type="button" class="tab-btn" data-tab="highlights" role="tab">ハイライト</button>
        <button type="button" class="tab-btn" data-tab="calorie" role="tab">カロリー</button>
        <button type="button" class="tab-btn" data-tab="equiv" role="tab">換算</button>
      </nav>
      <div class="tab-panels">
        <div id="tab-stats" class="tab-panel active" role="tabpanel">
          <div id="stats-grid" class="stats-grid"></div>
        </div>
        <div id="tab-highlights" class="tab-panel" role="tabpanel">
          <div id="highlights-tab"></div>
        </div>
        <div id="tab-calorie" class="tab-panel" role="tabpanel">
          <form id="calorie-form" class="report-form">
            <div class="form-row">
              <label>年齢<input type="number" id="inp-age" min="10" max="100" value="35"></label>
              <label>体重(kg)<input type="number" id="inp-weight" min="30" max="200" value="65" step="0.5"></label>
            </div>
            <div class="form-row">
              <label>性別
                <select id="inp-gender">
                  <option value="male">男性</option>
                  <option value="female">女性</option>
                </select>
              </label>
              <label>活動
                <select id="inp-activity">
                  <option value="walking">徒歩</option>
                  <option value="hiking">登山</option>
                  <option value="running">ランニング</option>
                  <option value="cycling">自転車</option>
                  <option value="car">車</option>
                </select>
              </label>
            </div>
          </form>
          <div id="calorie-result" class="report-block"></div>
        </div>
        <div id="tab-equiv" class="tab-panel" role="tabpanel">
          <div class="equiv-section-title">アクティビティ換算</div>
          <div id="activity-equiv" class="report-block"></div>
          <div class="equiv-section-title">食べ物換算</div>
          <label class="food-region-label">Food Region
            <select id="food-region">
              <option value="global">Global</option>
              <option value="japan">Japan</option>
              <option value="usa">USA</option>
              <option value="europe">Europe</option>
              <option value="asia">Asia</option>
            </select>
          </label>
          <div id="food-equiv" class="report-block"></div>
        </div>
      </div>
      <p class="report-disclaimer">※ カロリー・換算は参考値です（医療用途ではありません）</p>
    </aside>
    <div id="layout">
  <div id="map-wrap">
    <div id="map"></div>
    <div id="layer-panel" class="panel">
      <div class="panel-title">地図レイヤ</div>
      <select id="layer-select">
        <option value="standard">OpenStreetMap（標準）</option>
        <option value="terrain">OpenTopoMap（地形図）</option>
        <option value="aerial">Esri Satellite（航空写真）</option>
        <option value="dark">Carto Dark（ダーク）</option>
        <option value="hiking">ハイキング向け</option>
        <option value="cycling">サイクリング向け</option>
      </select>
    </div>
    <div id="replay-panel" class="panel">
      <button type="button" class="replay-btn" id="btn-rewind" title="最初へ">⏮</button>
      <button type="button" class="replay-btn" id="btn-play" title="再生">▶</button>
      <button type="button" class="replay-btn" id="btn-pause" title="一時停止">⏸</button>
      <button type="button" class="replay-btn" id="btn-forward" title="最後へ">⏭</button>
      <select id="speed-select" title="再生速度"></select>
    </div>
  </div>
  <div id="photo-timeline-panel">
    <div class="panel-title">写真タイムライン</div>
    <div id="photo-timeline"></div>
    <div id="no-photos-hint">写真がありません</div>
  </div>
  <div id="chart-panel" aria-label="標高プロファイル">
    <div class="panel-title">標高プロファイル</div>
    <div id="elevation-chart-wrap">
      <canvas id="elevation-chart"></canvas>
      <div id="no-elevation-hint">標高データがありません（GPX の &lt;ele&gt; タグが必要です）</div>
    </div>
    <div id="profile-readouts" aria-live="polite">
      <div class="readout-item"><span class="readout-label">距離</span><span class="readout-value" id="readout-distance">—</span></div>
      <div class="readout-item"><span class="readout-label">標高</span><span class="readout-value" id="readout-elevation">—</span></div>
      <div class="readout-item"><span class="readout-label">時刻</span><span class="readout-value" id="readout-time">—</span></div>
      <div class="readout-item"><span class="readout-label">速度</span><span class="readout-value" id="readout-speed">—</span></div>
      <div class="readout-item"><span class="readout-label">勾配</span><span class="readout-value" id="readout-grade">—</span></div>
      <div class="readout-item"><span class="readout-label">経過</span><span class="readout-value" id="readout-elapsed">—</span></div>
    </div>
  </div>
    </div>
  </div>
</div>
<script src="leaflet/leaflet.js"></script>
<script src="chartjs/chart.umd.js"></script>
<script src="travel_replay.js"></script>
