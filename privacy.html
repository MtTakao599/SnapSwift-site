<h1>プライバシーポリシー</h1>
<p>SnapSwift は、ユーザーの写真や個人情報を大切に扱います。</p>

<section>
<h2>収集する情報</h2>
<p>SnapSwift はお客様の個人情報を収集しません。写真データは基本的にお客様のデバイス内で処理されます。</p>
</section>

<section>
<h2>広告・解析</h2>
<p>SnapSwift は広告を表示しません。また、利用状況の解析ツールは使用していません。</p>
</section>

<section>
<h2>外部サービス</h2>
<p>Googleレンズなど外部サービスを利用する機能では、ユーザー操作により外部サービスへ遷移する場合があります。</p>
</section>

<p>ご質問は <a href="mailto:violakamikita@gmail.com">violakamikita@gmail.com</a> までお願いします。</p>
